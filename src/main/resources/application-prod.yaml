server:
  forward-headers-strategy: framework
  port: 8080
  servlet:
    context-path: /
    session:
      cookie:
        http-only: true
        secure: true
        same-site: lax

spring:
  datasource:
    url: ${DB_URL}
    username: ${MYSQL_ROOT_USER}
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        generate_statistics: false

vaadin:
  launch-browser: false
  frontend:
    hotdeploy: false

logging:
  level:
    root: INFO
    com.esvar.dekanat: INFO
