spring:
  application:
    name: Dekanat

  datasource:
    url: ${DB_URL}
    username: ${MYSQL_ROOT_USER}
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: true

  # SMTP (відправка листів)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}
            required: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        generate_statistics: false

vaadin:
  launch-browser: true

upload:
  dir: uploads

# Твої кастомні налаштування (IMAP + синхронізація)
mail:
  default-from: ${MAIL_DEFAULT_FROM:}

  imap:
    host: ${MAIL_IMAP_HOST:imap.gmail.com}
    port: ${MAIL_IMAP_PORT:993}
    username: ${MAIL_IMAP_USERNAME:${MAIL_USERNAME:}}
    password: ${MAIL_IMAP_PASSWORD:}
    inbox-folder: ${MAIL_IMAP_INBOX:INBOX}
    sent-folder: ${MAIL_IMAP_SENT:[Gmail]/Надіслані}
    use-ssl: ${MAIL_IMAP_SSL:true}

  sync:
    enabled: ${MAIL_SYNC_ENABLED:false}
    interval-ms: ${MAIL_SYNC_INTERVAL_MS:60000}

  attachments:
    dir: ${MAIL_ATTACHMENTS_DIR:uploads/mail}
    max-size-bytes: ${MAIL_ATTACHMENTS_MAX_SIZE:5242880}

# Якщо треба довіряти заголовкам проксі (nginx/cloudflare)
#server:
#  port: ${SERVER_PORT:8080}
#  forward-headers-strategy: framework

logging:
  level:
    root: INFO
    com.esvar.dekanat: DEBUG
